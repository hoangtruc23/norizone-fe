<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>NORI ZONE - Giao diện Sang Trọng</title>
    <!-- Import font chữ sang trọng (Playfair Display cho tiêu đề và Montserrat cho văn bản) -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- RESET CSS --- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background-color: #111;
        color: #fff;
        overflow-x: hidden;
      }

      /* --- HERO SECTION --- */
      .hero {
        position: relative;
        width: 100%;
        height: 100vh;
        /* Thay link ảnh nền của bạn vào đây */
        background: url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80")
          no-repeat center center/cover;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 40px 80px;
      }

      /* Lớp phủ tối giúp text rõ ràng hơn giống như image_a18367.jpg */
      .hero::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        z-index: 1;
      }

      /* Đẩy các phần tử lên trên lớp phủ */
      .header,
      .hero-main {
        position: relative;
        z-index: 2;
      }

      /* --- HEADER / NAVIGATION --- */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding-bottom: 20px;
      }

      .logo {
        font-family: "Playfair Display", serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 2px;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 40px;
      }

      .lang-switch {
        font-size: 13px;
        letter-spacing: 1px;
      }

      .lang-switch span {
        cursor: pointer;
        opacity: 0.6;
        transition: opacity 0.3s;
      }

      .lang-switch span.active,
      .lang-switch span:hover {
        opacity: 1;
      }

      .btn-visit {
        border: 1px solid #fff;
        background: transparent;
        color: #fff;
        padding: 12px 28px;
        border-radius: 30px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-visit:hover {
        background-color: #fff;
        color: #111;
      }

      .menu-toggle {
        display: flex;
        flex-direction: column;
        gap: 6px;
        cursor: pointer;
      }

      .menu-toggle span {
        width: 24px;
        height: 1px;
        background-color: #fff;
      }

      /* --- HERO MAIN CONTENT --- */
      .hero-main {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        align-items: flex-end;
        margin-bottom: 40px;
      }

      /* Tên thương hiệu cực đại tràn góc trái */
      .brand-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(5rem, 12vw, 11rem);
        line-height: 0.9;
        font-weight: 400;
        letter-spacing: -2px;
        margin-left: -10px; /* Hơi tràn nhẹ ra lề tạo cảm giác nghệ thuật */
      }

      /* Khối thông tin bên phải */
      .hero-info {
        max-width: 420px;
        justify-self: end;
        padding-bottom: 20px;
      }

      .info-subtitle {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 20px;
        line-height: 1.4;
        margin-bottom: 20px;
        letter-spacing: 0.5px;
      }

      .info-desc {
        font-size: 14px;
        line-height: 1.6;
        opacity: 0.8;
        font-weight: 300;
        margin-bottom: 40px;
      }

      .scroll-down {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        display: inline-block;
        opacity: 0.7;
        transition: opacity 0.3s;
      }

      .scroll-down:hover {
        opacity: 1;
      }

      /* --- RESPONSIVE RESPONSIVE --- */
      @media (max-width: 992px) {
        .hero {
          padding: 30px 40px;
        }
        .hero-main {
          grid-template-columns: 1fr;
          gap: 40px;
        }
        .hero-info {
          justify-self: start;
          max-width: 100%;
        }
        .brand-title {
          font-size: 8rem;
        }
      }

      @media (max-width: 576px) {
        .hero {
          padding: 20px 20px;
        }
        .nav-right {
          gap: 20px;
        }
        .btn-visit {
          display: none; /* Ẩn bớt nút trên mobile cho gọn */
        }
        .brand-title {
          font-size: 5rem;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <!-- Header / Thanh điều hướng -->
      <header class="header">
        <div class="logo">NORI ZONE</div>
        <div class="nav-right">
          <div class="lang-switch">
            <span class="active">EN</span>
            —
            <span>VI</span>
          </div>
          <button class="btn-visit">Khám phá ngay</button>
          <div class="menu-toggle">
            <span></span>
            <span></span>
          </div>
        </div>
      </header>

      <!-- Nội dung chính giữa / dưới của Hero Section -->
      <div class="hero-main">
        <!-- Tên thương hiệu lớn -->
        <h1 class="brand-title">NORI ZONE</h1>

        <!-- Khối mô tả bên phải -->
        <div class="hero-info">
          <h2 class="info-subtitle">
            KIẾN TRÚC THƯỢNG LƯU
            <br />
            TRONG SỰ HÒA HỢP TUYỆT ĐỐI
          </h2>
          <p class="info-desc">
            Chào mừng bạn đến với không gian của NORI ZONE, nơi thiết kế vượt thời gian hòa quyện
            cùng phong cách sống thượng lưu, tạo nên một thánh đường của sự sang trọng, tinh tế và
            bình yên nguyên bản.
          </p>
          <div class="scroll-down">Cuộn xuống —</div>
        </div>
      </div>
    </section>
  </body>
</html>
